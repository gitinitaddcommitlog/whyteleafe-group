<script>
    function showProduct(product) {
        // Hide all product sections
        document.getElementById('unrefined').classList.remove('active');
        document.getElementById('refined').classList.remove('active');
        
        // Remove active class from both tabs
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => tab.classList.remove('active'));
        
        // Show selected product
        document.getElementById(product).classList.add('active');
        
        // Add active class to clicked tab
        if (product === 'unrefined') {
            tabs[0].classList.add('active');
        } else {
            tabs[1].classList.add('active');
        }
        
        // Update URL without reloading the page
        const url = new URL(window.location);
        url.searchParams.set('type', product);
        window.history.pushState({}, '', url);
    }

    // On page load, check URL parameter and show correct tab
    window.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const productType = urlParams.get('type');
        
        if (productType === 'refined') {
            showProduct('refined');
        } else {
            showProduct('unrefined'); // Default to unrefined
        }
    });
</script>
