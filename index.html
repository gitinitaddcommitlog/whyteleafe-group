<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whyteleafe Group - Certificate of Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f0e8;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .header {
            background: #2d5a27;
            color: white;
            padding: 20px 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .content {
            padding: 30px;
        }
        .pdf-container {
            border: 1px solid #ddd;
            border-radius: 12px;
            overflow: hidden;
            background: #f5f5f5;
        }
        .pdf-container iframe {
            width: 100%;
            height: 700px;
            border: none;
        }
        .download-link {
            text-align: center;
            margin-top: 20px;
        }
        .btn {
            display: inline-block;
            background: #2d5a27;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }
        .btn:hover {
            background: #1e3d1a;
        }
        .footer {
            background: #f5f0e8;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #ddd;
        }
        @media (max-width: 600px) {
            .pdf-container iframe { height: 500px; }
            .header h1 { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Whyteleafe Group</h1>
            <p>Certificate of Analysis — Unrefined Shea Butter</p>
        </div>
        <div class="content">
            <div class="pdf-container">
                <iframe src="certificate.pdf"></iframe>
            </div>
            <div class="download-link">
                <a href="certificate.pdf" class="btn" download>📥 Download Certificate (PDF)</a>
            </div>
        </div>
        <div class="footer">
            For product information, branding, and full details, visit our main website.
        </div>
    </div>
</body>
</html>
