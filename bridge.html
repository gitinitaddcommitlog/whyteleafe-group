<!DOCTYPE html>
<html>
<head>
    <title>Whyteleafe Group</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
            background: #f5f0e8;
        }
        .box {
            max-width: 350px;
            margin: 0 auto;
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2d5a27;
            font-size: 28px;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        .btn {
            display: block;
            background: #2d5a27;
            color: white;
            padding: 14px;
            margin: 15px 0;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
        }
        .btn-website {
            background: #2d5a27;
        }
        .btn-cert {
            background: #8b5e3c;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🌿 Whyteleafe Group</h1>
        <p>Pure Ghanaian Unrefined Shea Butter</p>
        <a href="https://whyteleafegroup.com" class="btn btn-website">🌐 Visit Our Website</a>
        <a href="https://gitinitaddcommitlog.github.io/whyteleafe-group/" class="btn btn-cert">📄 View Certificate of Analysis</a>
        <div class="footer">
            🇬🇭 Made in Ghana | 100% Pure & Unrefined
        </div>
    </div>
</body>
</html>
